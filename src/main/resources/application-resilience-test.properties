# ==========================================
# CONFIGURACIÓN PARA PRUEBAS E2E DE RESILIENCE
# ==========================================

# --- BASE DE DATOS (H2 IN-MEMORY) ---
spring.datasource.writer.jdbc-url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.writer.username=sa
spring.datasource.writer.password=
spring.datasource.writer.driver-class-name=org.h2.Driver

spring.datasource.reader.jdbc-url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.reader.username=sa
spring.datasource.reader.password=
spring.datasource.reader.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# --- REDIS (EMBEDDED) ---
spring.data.redis.host=localhost
spring.data.redis.port=6370
spring.data.redis.timeout=1000

# --- KAFKA (EMBEDDED) ---
spring.kafka.bootstrap-servers=localhost:9093

# ==========================================
# RESILIENCE4J - CIRCUIT BREAKER CONFIGURATION
# ==========================================

# --- DATABASE CIRCUIT BREAKER ---
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.slow-call-rate-threshold=100
resilience4j.circuitbreaker.configs.default.slow-call-duration-threshold=2s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=1
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=false
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10

# DB Circuit Breaker
resilience4j.circuitbreaker.instances.db.base-config=default
resilience4j.circuitbreaker.instances.db.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.db.record-exceptions=java.sql.SQLException,java.sql.SQLTimeoutException,java.sql.SQLRecoverableException,org.postgresql.util.PSQLException,java.net.ConnectException,java.net.SocketTimeoutException,java.net.UnknownHostException

# Redis Circuit Breaker
resilience4j.circuitbreaker.instances.redis.base-config=default
resilience4j.circuitbreaker.instances.redis.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.redis.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redis.record-exceptions=org.springframework.data.redis.connection.RedisConnectionFailureException,redis.clients.jedis.exceptions.JedisConnectionException,redis.clients.jedis.exceptions.JedisException,java.net.SocketTimeoutException,java.io.IOException,java.net.UnknownHostException

# Kafka Circuit Breaker
resilience4j.circuitbreaker.instances.kafka.base-config=default
resilience4j.circuitbreaker.instances.kafka.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafka.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafka.record-exceptions=org.springframework.kafka.KafkaException,java.util.concurrent.TimeoutException,org.apache.kafka.common.KafkaException,java.net.SocketTimeoutException,java.io.IOException,java.net.UnknownHostException

# ==========================================
# LOGGING
# ==========================================
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.com.economato=ERROR
logging.level.com.economato.inventory.health=DEBUG
logging.level.com.economato.inventory.resilience=DEBUG

# ==========================================
# JPA
# ==========================================
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# CACHE
# ==========================================
spring.cache.type=redis
spring.cache.redis.time-to-live=1800000
spring.cache.redis.cache-null-values=false

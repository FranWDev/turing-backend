spring.application.name=inventory

server.port=8081
# ==========================================
# RENDIMIENTO: VIRTUAL THREADS & SERVER
# ==========================================
server.tomcat.accept-count=100
server.tomcat.max-connections=500

# ==========================================
# SILENCIO
# ==========================================
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.com.economato=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=ERROR

# ==========================================
# SEGURIDAD & JWT
# ==========================================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# BASE DE DATOS (CQRS)
# ==========================================
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=128

# --- DATASOURCES ---
spring.datasource.writer.jdbc-url=${DB_WRITER_URL:jdbc:postgresql://localhost:5432/inventory}
spring.datasource.writer.username=${SPRING_DATASOURCE_USERNAME:inventory_user}
spring.datasource.writer.password=${SPRING_DATASOURCE_PASSWORD:inventory_password}
spring.datasource.writer.driver-class-name=org.postgresql.Driver

spring.datasource.reader.jdbc-url=${DB_READER_URL:jdbc:postgresql://localhost:5433/inventory}
spring.datasource.reader.username=${SPRING_DATASOURCE_USERNAME:inventory_user}
spring.datasource.reader.password=${SPRING_DATASOURCE_PASSWORD:inventory_password}
spring.datasource.reader.driver-class-name=org.postgresql.Driver

# ==========================================
# HIKARI CP (POOL DE CONEXIONES)
# ==========================================
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=2
# Reducir timeout a 2 segundos para fallar rapido si la DB esta inaccesible
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.validation-timeout=1000
# Timeouts de socket para PostgreSQL (evita hilos colgados infinitamente, en segundos)
spring.datasource.hikari.data-source-properties.socketTimeout=5
spring.datasource.hikari.data-source-properties.connectTimeout=3
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# ==========================================
# REDIS (CACHÉ)
# ==========================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=500
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=5
spring.data.redis.jedis.pool.min-idle=2

spring.cache.type=redis
spring.cache.redis.time-to-live=1800000
spring.cache.redis.cache-null-values=false
spring.cache.redis.enable-statistics=true

# ==========================================
# SPRING BOOT & DEVTOOLS
# ==========================================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.thymeleaf.cache=true

# ==========================================
# ACTUATOR & DOCS
# ==========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- ACTUATOR & OBSERVABILITY ---
# Exponer solo lo estrictamente necesario (Hardening)
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never

# Tags Globales para Agregación en Grafana
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=production
management.metrics.tags.region=dc-1

# Monitoreo de Subsistemas Críticos
management.metrics.enable.hikaricp=true
management.metrics.enable.jvm=true
management.metrics.enable.kafka=true
management.metrics.enable.cache=true

# ==========================================
# Scalar Configuration
# ==========================================
scalar.enabled=true
scalar.path=/scalar
scalar.url=/v3/api-docs
scalar.hideTestRequestButton=true
scalar.theme=deepSpace
scalar.darkMode=true
scalar.hideModels=true
scalar.pageTitle=Smart Economato | API Docs


# ==========================================
# KAFKA
# ==========================================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=10
spring.kafka.producer.buffer-memory=8388608
spring.kafka.producer.acks=all
# Fail-fast: No bloquear el hilo mas de 2 segundos si Kafka no responde (por defecto es 60000ms)
spring.kafka.producer.properties.max.block.ms=2000

# ==========================================
# COMPRESIÓN HTTP
# ==========================================
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# Configuración de Threads Virtuales (Java 21+)
spring.threads.virtual.enabled=true

# Configuración i18n
spring.messages.basename=i18n/messages,i18n/ValidationMessages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Compatibilidad Jackson 2 en Spring Boot 4.0 (Jackson 3)
spring.jackson.use-jackson2-defaults=true

# ==========================================
# RESILIENCE4J CIRCUIT BREAKER
# ==========================================
# DB: Fail fast. Saltara al primer fallo de conexion (minimo de llamadas = 1).
resilience4j.circuitbreaker.instances.db.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.db.sliding-window-size=2
resilience4j.circuitbreaker.instances.db.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.db.minimum-number-of-calls=1
resilience4j.circuitbreaker.instances.db.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.db.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.instances.db.automatic-transition-from-open-to-half-open-enabled=false
# Solo saltar por errores de conexion (no por ConstraintViolation o sintaxis SQL)
resilience4j.circuitbreaker.instances.db.record-exceptions=org.springframework.dao.DataAccessResourceFailureException,org.springframework.transaction.CannotCreateTransactionException,org.hibernate.exception.JDBCConnectionException,java.sql.SQLTransientConnectionException,java.net.ConnectException,java.net.UnknownHostException
# REPLICA: Fail fast para alertar al frontend. La replica es importante pero no critica.
resilience4j.circuitbreaker.instances.replica.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.replica.sliding-window-size=2
resilience4j.circuitbreaker.instances.replica.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.replica.minimum-number-of-calls=1
resilience4j.circuitbreaker.instances.replica.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.replica.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.instances.replica.automatic-transition-from-open-to-half-open-enabled=false
# Solo saltar por errores de conexion a replica
resilience4j.circuitbreaker.instances.replica.record-exceptions=org.springframework.dao.DataAccessResourceFailureException,org.springframework.jdbc.CannotGetJdbcConnectionException,org.springframework.transaction.CannotCreateTransactionException,org.hibernate.exception.JDBCConnectionException,org.postgresql.util.PSQLException,java.sql.SQLTransientConnectionException,java.sql.SQLTimeoutException,java.net.ConnectException,java.net.SocketTimeoutException,java.net.UnknownHostException

# REDIS: Fail fast. Saltara al primer fallo de conexion instantaneamente.
resilience4j.circuitbreaker.instances.redis.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.redis.sliding-window-size=2
resilience4j.circuitbreaker.instances.redis.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redis.minimum-number-of-calls=1
resilience4j.circuitbreaker.instances.redis.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.redis.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.instances.redis.automatic-transition-from-open-to-half-open-enabled=false
# Solo saltar por errores de conexion a Redis (no por data invalidation o deserializacion)
resilience4j.circuitbreaker.instances.redis.record-exceptions=org.springframework.data.redis.RedisConnectionFailureException,org.springframework.data.redis.RedisSystemException,io.lettuce.core.RedisConnectionException,io.lettuce.core.RedisCommandTimeoutException,java.net.ConnectException,java.net.UnknownHostException

# KAFKA: Fail fast. El Outbox Processor dejara de intentar si Kafka esta caido.
resilience4j.circuitbreaker.instances.kafka.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.kafka.sliding-window-size=2
resilience4j.circuitbreaker.instances.kafka.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafka.minimum-number-of-calls=1
resilience4j.circuitbreaker.instances.kafka.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.kafka.permitted-number-of-calls-in-half-open-state=1
resilience4j.circuitbreaker.instances.kafka.automatic-transition-from-open-to-half-open-enabled=false
# Solo saltar por errores de conexion/timeout de Kafka
resilience4j.circuitbreaker.instances.kafka.record-exceptions=org.apache.kafka.common.errors.TimeoutException,org.apache.kafka.common.errors.NetworkException,java.util.concurrent.TimeoutException,java.net.UnknownHostException


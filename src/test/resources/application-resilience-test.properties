# ==========================================
# RESILIENCE E2E TEST PROFILE
# Activates Redis cache + Kafka + full circuit breaker stack
# ==========================================
spring.datasource.url=jdbc:h2:mem:resiliencedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Security
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=3600000

# Disable data init
spring.sql.init.mode=never

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000

# ==========================================
# REDIS - ENABLED with embedded Redis on port 6370
# ==========================================
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6370
spring.data.redis.timeout=1000

# ==========================================
# KAFKA
# ==========================================
spring.kafka.bootstrap-servers=localhost:9093

# ==========================================
# Observability - Disabled
# ==========================================
management.metrics.export.prometheus.enabled=false

# ==========================================
# Logging - Minimal noise
# ==========================================
spring.main.banner-mode=off
logging.level.root=ERROR
logging.level.com.economato=WARN
logging.level.org.springframework=WARN
logging.level.org.apache.kafka=ERROR

# Jackson compat
spring.jackson.use-jackson2-defaults=true
